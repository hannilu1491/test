<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sweetaste 購物車</title>

    <!-- 共用樣式 -->
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link rel="stylesheet" href="../css/output.css" />

    <!-- ✅ Scoped Tailwind 專用 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        prefix: "tw-", // 加上前綴避免與舊 CSS 衝突
        theme: {
          extend: {
            colors: {
              primary: "#3F5D45",
              "light-bg": "#EAF0ED",
              accent: "#FFE180",
            },
          },
        },
      };
    </script>
  </head>

  <body class="bg-white cart-page">
    <!-- === Header（共用） === -->
    <header class="site-header">
      <div class="container header__inner px-[0px] md:px-[42px] mx-auto">
        <button
          class="hamburger w-[24px] h-[24px] flex items-center justify-center"
          id="hamburger"
          aria-label="開啟選單"
        >
          <img
            src="../assets/images/icon-hamburger.svg"
            alt="開啟選單"
            class="w-[24px] h-[24px]"
          />
        </button>

        <a class="logo z-50" href="../index.html">
          <img src="../assets/images/logo-all-dark.svg" alt="logo" />
        </a>

        <nav class="nav" aria-label="主選單">
          <ul class="nav__list">
            <li><a href="../index.html" class="nav__link">首頁</a></li>
            <li><a href="products.html" class="nav__link">甜點</a></li>
            <li><a href="login.html" class="nav__link">登入</a></li>
          </ul>
        </nav>

        <a class="nav__cart" href="cart.html" aria-label="購物車">
          <img src="../assets/images/shopping_cart.svg" alt="購物車" />
        </a>
      </div>

      <!-- 行動選單 -->
      <nav
        id="mobileMenu"
        class="mobile-menu hidden fixed top-[80px] left-0 w-full bg-white flex-col items-center justify-start gap-[16px] py-[24px] z-40 transition-all duration-300 ease-in-out"
      >
        <ul class="mobile-menu__list">
          <li><a href="../index.html">首頁</a></li>
          <li><a href="products.html">甜點</a></li>
          <li><a href="login.html">登入</a></li>
        </ul>
      </nav>
    </header>

    <!-- === 主內容區 === -->

    <main>
      <!-- ========================= -->
      <!-- 🧁 Scoped Tailwind 商品卡區 -->
      <!-- ========================= -->
      <div class="tailwind-scope tw-max-w-[1440px] tw-mx-auto tw-py-8">
        <div class="tw-flex tw-flex-col lg:tw-flex-row tw-gap-8">
          <!-- 左側商品清單 -->
          <section class="tw-flex-1">
            <h2
              class="tw-bg-light-bg tw-text-primary tw-text-2xl tw-font-semibold tw-text-center tw-py-5 tw-mb-8"
            >
              您的購物車
            </h2>

            <div class="tw-space-y-5">
              <!-- 商品卡 -->
              <article class="tw-border-b tw-border-light-bg tw-pb-5">
                <div class="tw-flex tw-flex-col sm:tw-flex-row tw-gap-4">
                  <div class="tw-flex-shrink-0">
                    <img
                      src="https://images.unsplash.com/photo-1486427944299-d1955d23e34d?w=300&h=300&fit=crop"
                      alt="焦糖馬卡龍"
                      class="tw-w-full sm:tw-w-[110px] tw-h-[200px] sm:tw-h-[110px] tw-object-cover tw-rounded"
                    />
                  </div>
                  <div class="tw-flex-1 tw-flex tw-flex-col tw-justify-between">
                    <div class="tw-mb-3">
                      <h3
                        class="tw-text-primary tw-text-lg sm:tw-text-xl tw-font-light tw-mb-1"
                      >
                        焦糖馬卡龍
                      </h3>
                      <p class="tw-text-primary tw-text-base">NT$ 450</p>
                    </div>

                    <div
                      class="tw-flex tw-items-center tw-justify-between tw-gap-4"
                    >
                      <div class="tw-flex tw-border tw-border-light-bg">
                        <button
                          class="tw-w-12 tw-h-12 tw-flex tw-items-center tw-justify-center tw-text-primary tw-border-r tw-border-light-bg"
                        >
                          −
                        </button>
                        <span
                          class="tw-w-12 tw-h-12 tw-flex tw-items-center tw-justify-center tw-text-primary tw-border-r tw-border-light-bg"
                          >2</span
                        >
                        <button
                          class="tw-w-12 tw-h-12 tw-flex tw-items-center tw-justify-center tw-text-primary"
                        >
                          ＋
                        </button>
                      </div>
                      <div class="tw-flex tw-items-center tw-gap-3">
                        <p
                          class="tw-text-primary tw-text-xl tw-font-semibold tw-whitespace-nowrap"
                        >
                          NT$ 900
                        </p>
                        <button class="tw-text-primary hover:tw-text-red-500">
                          <svg
                            xmlns="http://www.w3.org/2000/svg"
                            class="tw-w-5 tw-h-5"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            viewBox="0 0 24 24"
                          >
                            <path
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1H9a1 1 0 00-1 1v3M4 7h16"
                            />
                          </svg>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </article>
            </div>
          </section>

          <!-- 右側訂單摘要 -->
          <aside
            class="tw-w-full lg:tw-w-[340px] tw-bg-primary tw-text-light-bg tw-h-fit tw-self-start"
          >
            <h2 class="tw-text-2xl tw-font-semibold tw-text-center tw-py-4">
              訂單摘要
            </h2>
            <hr class="tw-border-light-bg tw-opacity-30 tw-mx-6" />
            <div class="tw-px-6 tw-py-5 tw-space-y-2">
              <div class="tw-flex tw-justify-between">
                <span>小計</span><span>NT$ 900</span>
              </div>
              <div class="tw-flex tw-justify-between">
                <span>運費</span><span>NT$ 100</span>
              </div>
            </div>
            <hr class="tw-border-light-bg tw-opacity-30 tw-mx-6" />
            <div
              class="tw-px-6 tw-py-5 tw-flex tw-justify-between tw-items-center tw-text-xl tw-font-semibold"
            >
              <span>總計</span><span>NT$ 1,000</span>
            </div>
            <button
              class="tw-w-full tw-h-16 tw-bg-accent tw-text-primary tw-text-2xl tw-font-semibold hover:tw-bg-yellow-200"
            >
              結帳
            </button>
          </aside>
        </div>
      </div>
    </main>

    <!-- === Footer（共用） === -->
    <section class="newsletter">
      <div class="container newsletter__inner">
        <div class="newsletter__brand">
          <img src="../assets/images/logo-light.svg" class="newsletter__logo" />
          <span>訂閱你的甜蜜郵件</span>
        </div>
        <form class="newsletter__form">
          <div class="newsletter__input-wrapper">
            <img src="../assets/images/ic-mail.svg" class="newsletter__icon" />
            <input
              type="email"
              class="newsletter__input"
              placeholder="email@example.com"
            />
          </div>
          <button type="submit" class="newsletter__submit">
            <img
              src="../assets/images/ic-arrow-right.svg"
              class="newsletter__arrow"
            />
          </button>
        </form>
      </div>
    </section>

    <footer class="site-footer">
      <div class="container footer__inner">
        <div class="footer__left">
          <img
            src="../assets/images/logotype-lg-dark.svg"
            class="footer__logo"
          />
          <div class="footer__info">
            <p>07-1234-5678</p>
            <p>sweetaste@email.com</p>
            <p>800 高雄市新興區幸福路 520 號</p>
          </div>
          <div class="footer__social">
            <img src="../assets/images/ic-line@.svg" class="footer__icon" />
            <img src="../assets/images/ic-facebook.svg" class="footer__icon" />
          </div>
        </div>

        <div class="footer__right">
          <div class="footer__slogan">
            <div class="footer__slogan-line">
              <span class="footer__slogan-text footer__slogan-text--top"
                >今天是個</span
              >
              <span class="footer__slogan-divider"></span>
            </div>
            <span class="footer__slogan-text footer__slogan-text--bottom"
              >吃甜點的好日子。</span
            >
          </div>
          <p class="footer__copy">© 2018 Sweetaste* All Rights Reserved</p>
        </div>
      </div>
    </footer>

    <script src="../js/main.js"></script>
  </body>
</html>
